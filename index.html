    *{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:16px}button,input,select,textarea{font:inherit;color:inherit}button,select{cursor:pointer}
    .shell{min-height:100vh;display:block}
    .content{width:min(1480px,100%);min-width:0;margin:0 auto;padding:36px clamp(24px,4vw,58px) 64px}.header{display:flex;justify-content:space-between;align-items:flex-end;gap:20px}.eyebrow{color:var(--violet);font-size:18px;font-weight:800;letter-spacing:.1em}h1{margin:9px 0 6px;font-size:27px;font-weight:700}.header p{margin:0;color:var(--muted);font-size:14px}.primary{border:0;border-radius:9px;padding:11px 16px;background:var(--ink);color:#fff;font-size:14px}
    .roadmap{margin-top:24px;padding:24px;border:1px solid var(--line);border-radius:14px;background:#fff}.roadmap-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}.roadmap-head h2{margin:0;font-size:20px}.current-stage{padding:7px 11px;border-radius:16px;color:#fff;background:var(--violet);font-size:12px;font-weight:700}.roadmap-track{position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.roadmap-track:before{content:"";position:absolute;top:18px;left:16%;right:16%;height:2px;background:#e2e4ea}.roadmap-step{position:relative;z-index:1;min-height:140px;padding:48px 18px 17px;border:1px solid var(--line);border-radius:11px;background:#fafbfc}.roadmap-step .step-no{position:absolute;top:4px;left:calc(50% - 15px);width:30px;height:30px;display:grid;place-items:center;border:5px solid #eceef3;border-radius:50%;color:#858c9b;background:#fff;font-size:12px;font-weight:800}.roadmap-step.active{border-color:#d9d1fa;background:#f7f5ff}.roadmap-step.active .step-no{border-color:#dcd5fa;color:#fff;background:var(--violet)}.roadmap-step strong,.roadmap-step span{display:block}.roadmap-step strong{margin-bottom:8px;font-size:15px;text-align:center}.roadmap-step span{margin-top:6px;color:#70788a;font-size:13px;line-height:1.5}.roadmap-step.active strong{color:#5843b4}
    .plan-tabs{margin-top:20px;display:flex;gap:9px}.plan-tabs button{border:1px solid #dfe2e9;border-radius:9px;padding:11px 15px;color:#697184;background:#fff;font-size:14px;font-weight:700}.plan-tabs button b{margin-left:7px;padding:2px 7px;border-radius:10px;color:#7b8395;background:#f0f1f5;font-size:12px}.plan-tabs button.active{border-color:var(--ink);color:#fff;background:var(--ink)}.plan-tabs button.active b{color:var(--ink);background:#fff}
    .toolbar{margin:12px 0;display:flex;align-items:center;gap:9px;flex-wrap:wrap}.search{flex:1 1 260px;height:46px;padding:0 13px;display:flex;align-items:center;gap:7px;border:1px solid #dfe2e9;border-radius:8px;background:#fff}.search input{width:100%;border:0;outline:0;font-size:14px}.toolbar select{height:46px;min-width:126px;padding:0 30px 0 11px;border:1px solid #dfe2e9;border-radius:8px;background:#fff;font-size:13px}.toggle{display:flex;padding:3px;border:1px solid #dfe2e9;border-radius:8px;background:#fff}.toggle button{border:0;border-radius:5px;padding:9px 13px;color:#7a8293;background:transparent;font-size:13px}.toggle button.active{color:#fff;background:var(--ink)}.count{color:#8c93a2;font-size:13px}
    .card{overflow:hidden;border:1px solid var(--line);border-radius:13px;background:#fff;box-shadow:0 8px 25px rgba(27,34,53,.035)}.row{display:grid;grid-template-columns:minmax(180px,1.05fr) 150px 130px 72px 120px 380px 76px;gap:10px;align-items:center}.thead{min-height:58px;padding:0 16px;color:#515b6f;background:#fafbfc;font-size:15px;font-weight:800}.req{min-height:118px;padding:15px 16px;border-top:1px solid #edf0f3}.req:hover{background:#faf9ff}.feature strong,.feature small{display:block}.feature strong{margin:6px 0;font-size:17px}.feature small{overflow:hidden;color:#737c8e;font-size:13px;text-overflow:ellipsis;white-space:nowrap}.reqid{color:#9098a8;font-size:11px;font-weight:700}.source{font-size:15px;font-weight:700}.source small{display:block;margin-top:5px;color:#737c8e;font-size:13px;font-weight:400}.source-link{margin-top:7px;border:0;padding:0;color:var(--violet);background:transparent;font-size:13px;font-weight:700;text-decoration:underline}.status{min-width:114px;border:1px solid #dcd5fa;border-radius:8px;padding:10px;color:#654bc6;background:#eeeafd;font-size:14px;font-weight:800}.s-test{color:#2673aa;border-color:#cfe6f5;background:#e9f3fa}.s-design{color:#8254a6;border-color:#e5d4f2;background:#f3eafb}.s-pool{color:#535b6c;border-color:#d8dbe2;background:#eceef2}.bar{width:114px;height:6px;margin-top:8px;border-radius:4px;overflow:hidden;background:#e9ebef}.bar i{display:block;height:100%;background:var(--violet)}.priority{display:grid;place-items:center;width:46px;height:34px;border-radius:6px;color:#654bc6;background:var(--violet-soft);font-size:13px;font-weight:800}.teams{display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:13px}.teams span{padding:6px 7px;border:1px solid #dfe2e8;border-radius:5px;color:#596377;background:#fff;font-size:12px}.phase-dates{display:grid;grid-template-columns:repeat(4,minmax(78px,1fr));gap:7px}.phase-dates label{display:block;color:#687184;font-size:12px;font-weight:700}.date-input{display:block;width:100%;height:34px;margin-top:4px;border:1px solid #dfe2e8;border-radius:6px;padding:5px 7px;color:#283044;background:#fff;font-size:13px;font-weight:700;outline:0}.date-input:focus{border-color:var(--violet);box-shadow:0 0 0 2px rgba(112,89,215,.12)}.risk-tag{justify-self:start;padding:7px 9px;border-radius:6px;color:#a26b33;background:#fff1e0;font-size:12px;font-weight:800}.risk-high{color:#b44d56;background:#ffeaec}
    .pagination{display:flex;align-items:center;justify-content:flex-end;gap:7px;margin-top:16px}.pagination button{min-width:38px;height:38px;border:1px solid #dfe2e9;border-radius:7px;color:#657084;background:#fff;font-size:13px}.pagination button.active{border-color:var(--ink);color:#fff;background:var(--ink)}.pagination button:disabled{cursor:not-allowed;opacity:.4}.pagination span{margin-right:auto;color:#8a92a1;font-size:13px}
    .schedule{display:none}.schedule-head,.schedule-row{display:grid;grid-template-columns:290px minmax(650px,1fr)}.schedule-head{min-height:48px;background:#fafbfc;color:#737c8e;font-size:11px;font-weight:700}.schedule-head>div:first-child{padding:17px}.weeks{display:grid;grid-template-columns:repeat(7,1fr)}.weeks span{display:flex;align-items:center;padding-left:8px;border-left:1px solid #e7e9ee}.schedule-row{min-height:72px;border-top:1px solid #eceef2}.schedule-name{display:flex;align-items:center;gap:10px;padding:12px 16px}.schedule-name strong,.schedule-name small{display:block}.schedule-name strong{font-size:12px}.schedule-name small{margin-top:5px;color:#8b92a1;font-size:10px}.timeline{position:relative;background:repeating-linear-gradient(90deg,transparent 0,transparent calc(14.285% - 1px),#eef0f3 calc(14.285% - 1px),#eef0f3 14.285%)}.timeline i{position:absolute;top:24px;height:24px;border-radius:6px;background:var(--violet);box-shadow:0 4px 10px rgba(112,89,215,.18)}
    .modal-bg{position:fixed;z-index:20;inset:0;display:none;align-items:center;justify-content:center;background:rgba(17,22,35,.34);backdrop-filter:blur(2px)}.modal{width:min(470px,92vw);max-height:88vh;overflow:auto;padding:28px;border-radius:16px;background:#fff;position:relative}.modal h2{margin:7px 0 18px;font-size:24px;font-weight:700}.close{position:absolute;right:18px;top:14px;border:0;background:transparent;font-size:23px}.modal label{display:grid;gap:6px;margin-top:12px;color:#747c8e;font-size:11px}.modal input,.modal select,.modal textarea{border:1px solid #dfe2e8;border-radius:7px;padding:9px 10px;font-size:12px}.modal textarea{min-height:70px}.modal .primary{width:100%;margin-top:17px}.source-meta{display:flex;gap:8px;margin-bottom:14px}.source-meta span{padding:5px 8px;border-radius:6px;color:#6551bc;background:#eeeafd;font-size:10px}.source-original{padding:16px;border:1px solid var(--line);border-radius:9px;color:#424a5c;background:#fafbfc;font-size:13px;line-height:1.75;white-space:pre-wrap}
    @media(max-width:900px){.content{padding-inline:22px}.card{overflow-x:auto}.row{min-width:1220px}}
    @media(max-width:680px){.content{padding:22px 13px 40px}.header{align-items:flex-start}.roadmap-track{grid-template-columns:1fr}.roadmap-track:before{display:none}.roadmap-step{padding-top:16px;padding-left:58px}.roadmap-step .step-no{top:17px;left:16px}.toolbar{flex-wrap:wrap}.search{flex:1 1 100%}.plan-tabs{overflow-x:auto}.plan-tabs button{flex:0 0 auto}}
  </style>

<body>
  <main class="shell">
    <section class="content">
      <header class="header"><div><span class="eyebrow">E-INK HOME DASHBOARD</span><h1 id="pageTitle">需求池</h1><p id="pageSubtitle">每个功能点独立管理状态、需求来源和发布时间</p></div><!-- 新建需求入口预留：确认建设时再开放 --></header>
      <section class="roadmap">
        <div class="roadmap-head"><h2>整体产品规划</h2><span class="current-stage">当前：可用性阶段</span></div>
        <div class="roadmap-track">
          <article class="roadmap-step active"><span class="step-no">1</span><strong>可用性与基础建设</strong><span>组件完善，提升基础可用性</span><span>补齐埋点与数据需求</span></article>
          <article class="roadmap-step"><span class="step-no">2</span><strong>易用性提升</strong><span>打通 App 与网页端同步逻辑</span><span>调整页面 UI 与操作体验</span></article>
          <article class="roadmap-step"><span class="step-no">3</span><strong>分享社区与开放生态</strong><span>支持用户分享自己的模板</span><span>建设模板分享社区</span></article>
        </div>
      </section>
      <div class="plan-tabs"><button class="active" data-plan="全部">全部需求<b>17</b></button><button data-plan="已排期">已排期<b>14</b></button><button data-plan="未规划">需求池未规划<b>3</b></button></div>
      <div class="toolbar"><label class="search">⌕<input id="searchInput" placeholder="搜索需求、模块或需求来源"></label><select id="statusFilter"><option>全部状态</option><option>需求池</option><option>设计中</option><option>开发中</option><option>测试中</option><option>待发布</option><option>已发布</option></select><select id="priorityFilter"><option>全部优先级</option><option>P0</option><option>P1</option><option>P2</option></select><select id="moduleFilter"><option>全部模块</option><option>生活组件</option><option>环境组件</option><option>数据基础建设</option><option>安全组件</option><option>RSS</option><option>新闻</option><option>模板</option><option>日程</option><option>同步</option><option>Web体验</option></select><select id="sortBy"><option value="status" selected>按状态排序</option><option value="default">按编号排序</option><option value="priority">按优先级排序</option><option value="release">按上线时间排序</option></select><div class="toggle"><button class="active" data-view="pool">列表</button><button data-view="schedule">排期</button></div><span class="count" id="resultCount">17 个需求</span></div>
      <section class="card pool" id="poolView">
        <div class="row thead"><span>功能点</span><span>需求来源</span><span>状态</span><span>优先级</span><span>涉及端</span><span>计划时间</span><span>风险</span></div>
        <div id="requirementRows"></div>
      </section>
      <section class="card schedule" id="scheduleView">
        <div class="schedule-head"><div>功能点</div><div class="weeks"><span>07/06</span><span>07/13</span><span>07/20</span><span>07/27</span><span>08/03</span><span>08/10</span><span>08/17</span></div></div>
        <div id="scheduleRows"></div>
      </section>
      <div class="pagination" id="pagination"></div>
    </section>
  </main>
  <div class="modal-bg" id="sourceModal"><div class="modal"><button class="close" type="button" id="closeSourceModal">×</button><span class="eyebrow">REQUIREMENT SOURCE</span><h2 id="sourceTitle">需求来源原文</h2><div class="source-meta"><span id="sourceType"></span><span id="sourceDetail"></span></div><div class="source-original" id="sourceOriginal"></div></div></div>
  <script>
    const requirements=[
      {id:1,title:"今日是否需要带伞",module:"生活组件",source:"用户反馈",sourceDetail:"社媒 / 客诉",sourceOriginal:"希望屏幕能直接告诉我今天要不要带伞，不想只看到降水概率，还要自己判断。",status:"待发布",priority:"P0",teams:["Web","后台"],lock:"07-08",dev:"07-10",test:"07-18",release:"07-24",progress:82,risk:"正常",description:"根据未来降水情况输出带伞结论"},
      {id:2,title:"室内空气质量状态",module:"环境组件",source:"用户反馈",sourceDetail:"设备联动建议",sourceOriginal:"希望把室内空气质量显示成容易理解的状态，并告诉我什么时候适合开窗通风。",status:"设计中",priority:"P0",teams:["Web","后台"],lock:"07-10",dev:"07-12",test:"07-20",release:"07-24",progress:64,risk:"关注",description:"展示空气质量结论与通风建议"},
      {id:3,title:"今日洗衣指数（日本）",module:"生活组件",source:"市场规划",sourceDetail:"日本市场",sourceOriginal:"日本用户日常关注洗衣与晾晒条件，需要根据天气给出今天是否适合洗衣、室内或室外晾晒的建议。",status:"待发布",priority:"P0",teams:["Web","后台"],lock:"07-10",dev:"07-15",test:"07-24",release:"07-29",progress:56,risk:"关注",description:"输出洗衣与晾晒建议"},
      {id:4,title:"绝对湿度",module:"环境组件",source:"内部规划",sourceDetail:"产品规划",sourceOriginal:"在现有相对湿度组件基础上补充绝对湿度，让用户了解空气中的实际水汽含量。",status:"待发布",priority:"P0",teams:["Web","后台"],lock:"07-08",dev:"07-10",test:"07-18",release:"07-24",progress:76,risk:"正常",description:"展示空气实际水汽含量"},
      {id:5,title:"日本垃圾日",module:"生活组件",source:"市场规划",sourceDetail:"日本本地化",sourceOriginal:"日本不同自治体的垃圾回收规则不同，用户希望在屏幕上直接看到今天要丢什么垃圾以及本周安排。",status:"设计中",priority:"P0",teams:["产品","Web","后台"],lock:"07-24",dev:"07-27",test:"08-03",release:"08-07",progress:32,risk:"高风险",description:"展示今日垃圾类型及一周预告"},
      {id:6,title:"多成员日程同页展示",module:"日程",source:"Zendesk",sourceDetail:"1269409",sourceOriginal:"家庭成员希望在同一个页面看到所有人的日程，并且能快速区分每条日程属于谁。",status:"设计中",priority:"P0",teams:["Web","App","后台"],lock:"07-31",dev:"08-03",test:"08-10",release:"08-14",progress:48,risk:"关注",description:"聚合多个家庭成员的日程"},
      {id:7,title:"CalDAV 日程同步",module:"日程",source:"Zendesk",sourceDetail:"1264859",sourceOriginal:"希望接入支持 CalDAV 的日历服务，将更多第三方日历同步到 Home Dashboard。",status:"设计中",priority:"P0",teams:["Web","App","后台"],lock:"07-15",dev:"07-25",test:"08-05",release:"08-13",progress:38,risk:"高风险",description:"连接更多第三方日历"},
      {id:8,title:"Web / App 设置同步",module:"同步",source:"体验问题",sourceDetail:"跨端操作割裂",sourceOriginal:"用户在 App 和网页端修改同一页面时，设置结果不一致，容易出现覆盖或不知道哪一端生效的问题。",status:"设计中",priority:"P0",teams:["Web","App","后台"],lock:"07-31",dev:"08-03",test:"08-10",release:"08-15",progress:52,risk:"高风险",description:"统一页面与模板设置"},
      {id:9,title:"手机 / 平板适配",module:"Web体验",source:"内部规划",sourceDetail:"多设备适配",sourceOriginal:"网页编辑器需要适配手机和平板，优先解决触控、画布缩放和小屏信息密度问题。",status:"设计中",priority:"P0",teams:["设计","Web"],lock:"07-31",dev:"08-07",test:"08-17",release:"08-23",progress:24,risk:"高风险",description:"适配触控与小屏编辑"},
      {id:10,title:"Shopping List",module:"模板",source:"竞品启发",sourceDetail:"待调研",sourceOriginal:"看到家庭信息屏上的共享购物清单场景，考虑是否适合纳入我们的可自定义内容体系，当前仍待调研。",status:"设计中",priority:"P1",teams:["产品","Web"],lock:"待定",dev:"待定",test:"待定",release:"待定",progress:10,risk:"关注",description:"家庭共享购物清单"},
      {id:11,title:"相对湿度",module:"环境组件",source:"内部规划",sourceDetail:"产品规划",sourceOriginal:"在现有环境信息展示基础上补充相对湿度组件，让用户了解当前空气湿度水平。",status:"待发布",priority:"P0",teams:["Web","后台"],lock:"07-08",dev:"07-10",test:"07-18",release:"07-24",progress:76,risk:"正常",description:"展示当前空气相对湿度"},
      {id:12,title:"埋点数据",module:"数据基础建设",source:"内部规划",sourceDetail:"数据建设",sourceOriginal:"需要补齐关键页面、组件配置与发布链路的行为埋点，为后续功能效果评估和问题定位提供基础数据。",status:"设计中",priority:"P0",teams:["Web","App","后台"],lock:"07-24",dev:"07-27",test:"08-03",release:"08-07",progress:20,risk:"关注",description:"补齐核心行为与发布链路数据"},
      {id:13,title:"油价",module:"生活组件",source:"市场规划",sourceDetail:"生活信息",sourceOriginal:"希望在电子屏幕上展示所在地的最新油价，便于用户快速了解日常出行成本。",status:"设计中",priority:"P0",teams:["Web","后台"],lock:"07-24",dev:"07-27",test:"07-29",release:"07-31",progress:15,risk:"关注",description:"展示所在地最新油价"},
      {id:14,title:"地震预警",module:"安全组件",source:"市场规划",sourceDetail:"灾害信息",sourceOriginal:"希望在发生地震风险时及时展示预警信息，并清晰呈现影响地区、震级与更新时间。",status:"设计中",priority:"P0",teams:["Web","后台"],lock:"07-31",dev:"08-03",test:"08-10",release:"08-14",progress:10,risk:"高风险",description:"展示地震风险与预警信息"},
      {id:15,title:"电价",module:"生活组件",source:"市场规划",sourceDetail:"生活信息",sourceOriginal:"希望在电子屏幕上查看当前及近期电价，帮助用户选择更合适的用电时间。",status:"设计中",priority:"P0",teams:["Web","后台"],lock:"07-31",dev:"08-03",test:"08-05",release:"08-07",progress:15,risk:"关注",description:"展示当前及近期电价"},
      {id:16,title:"RSS 更新频率提升",module:"RSS",source:"社媒 X",sourceDetail:"MQ 分享",sourceOriginal:"背景：\n社媒 X 用户反馈，MQ 分享。\n\n诉求：\nSwitchBot 的智能日历站，RSS 好像一天只更新一次左右。如果只是个摆钟加点附加功能那倒也无所谓，但还是希望能多更新几次啊。最好能收钱。\n\n期望上线时间：ASAP。",status:"需求池",priority:"P1",teams:["Web","后台"],lock:"待定",dev:"待定",test:"待定",release:"待定",progress:0,risk:"关注",description:"提升 RSS 内容刷新频率"},
      {id:17,title:"新闻组件多标题展示",module:"新闻",source:"用户反馈",sourceDetail:"新增需求",sourceOriginal:"新闻组件希望能同时展示多个新闻标题，减少单次只能查看一条内容的限制。",status:"需求池",priority:"P1",teams:["Web","后台"],lock:"待定",dev:"待定",test:"待定",release:"待定",progress:0,risk:"正常",description:"支持同时展示多个新闻标题"}
    ];
    const rowRoot=document.getElementById("requirementRows"),scheduleRoot=document.getElementById("scheduleRows"),pagination=document.getElementById("pagination");
    let planFilter="全部",currentPage=1;
    const pageSize=10,statusOrder={"已发布":0,"待发布":1,"设计中":2,"开发中":3,"测试中":4,"需求池":5};
    const statusStorageKey="eink-requirement-statuses-v2",dateStorageKey="eink-requirement-dates-v3",phaseOrder=["lock","dev","test","release"];
    try{
      const savedStatuses=JSON.parse(localStorage.getItem(statusStorageKey)||"{}");
      requirements.forEach(r=>{if(Object.prototype.hasOwnProperty.call(statusOrder,savedStatuses[r.id]))r.status=savedStatuses[r.id]});
    }catch(error){}
    try{
      const savedDates=JSON.parse(localStorage.getItem(dateStorageKey)||"{}");
      requirements.forEach(r=>{const dates=savedDates[r.id];if(dates) ["lock","dev","test","release"].forEach(field=>{if(typeof dates[field]==="string")r[field]=dates[field]})});
    }catch(error){}
    function saveStatuses(){try{localStorage.setItem(statusStorageKey,JSON.stringify(Object.fromEntries(requirements.map(r=>[r.id,r.status]))))}catch(error){}}
    function saveDates(){try{localStorage.setItem(dateStorageKey,JSON.stringify(Object.fromEntries(requirements.map(r=>[r.id,{lock:r.lock,dev:r.dev,test:r.test,release:r.release}]))))}catch(error){}}
    function parseMD(value){const match=/^(\d{2})-(\d{2})$/.exec(value);if(!match)return null;const month=Number(match[1]),day=Number(match[2]),date=new Date(Date.UTC(2026,month-1,day));return date.getUTCMonth()===month-1&&date.getUTCDate()===day?date:null}
    function formatMD(date){return String(date.getUTCMonth()+1).padStart(2,"0")+"-"+String(date.getUTCDate()).padStart(2,"0")}
    function shiftMD(value,days){const date=parseMD(value);if(!date)return value;date.setUTCDate(date.getUTCDate()+days);return formatMD(date)}
    function esc(value){return String(value).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
    function statusClass(s){return s==="测试中"?"s-test":s==="设计中"?"s-design":s==="需求池"?"s-pool":""}
    function render(){
      const q=document.getElementById("searchInput").value.trim().toLowerCase(),sf=document.getElementById("statusFilter").value,pf=document.getElementById("priorityFilter").value,mf=document.getElementById("moduleFilter").value,sort=document.getElementById("sortBy").value;
      const list=requirements.filter(r=>(!q||(r.title+r.module+r.source+r.sourceDetail+r.sourceOriginal).toLowerCase().includes(q))&&(sf==="全部状态"||r.status===sf)&&(pf==="全部优先级"||r.priority===pf)&&(mf==="全部模块"||r.module===mf)&&(planFilter==="全部"||(planFilter==="已排期"?r.release!=="待定":r.release==="待定")));
      if(sort==="priority")list.sort((a,b)=>a.priority.localeCompare(b.priority)||a.id-b.id);
      if(sort==="status")list.sort((a,b)=>statusOrder[a.status]-statusOrder[b.status]||a.id-b.id);
      if(sort==="release")list.sort((a,b)=>(a.release==="待定"?"99-99":a.release).localeCompare(b.release==="待定"?"99-99":b.release));
      const scheduled=requirements.filter(r=>r.release!=="待定").length,unplanned=requirements.length-scheduled;
      document.getElementById("resultCount").textContent=list.length+" 个需求";
      document.querySelector('[data-plan="全部"] b').textContent=requirements.length;document.querySelector('[data-plan="已排期"] b').textContent=scheduled;document.querySelector('[data-plan="未规划"] b').textContent=unplanned;
      const pageCount=Math.max(1,Math.ceil(list.length/pageSize));currentPage=Math.min(currentPage,pageCount);const startIndex=(currentPage-1)*pageSize,pageList=list.slice(startIndex,startIndex+pageSize);
      rowRoot.innerHTML=pageList.map(r=>`<article class="row req"><div class="feature"><span class="reqid">REQ-${String(r.id).padStart(3,"0")}</span><strong>${esc(r.title)}</strong><small>${esc(r.module)} · ${esc(r.description)}</small></div><div class="source">${esc(r.source)}<small>${esc(r.sourceDetail)}</small><button class="source-link" data-source-id="${r.id}">查看原文</button></div><div><select class="status ${statusClass(r.status)}" data-id="${r.id}">${["需求池","设计中","开发中","测试中","待发布","已发布"].map(s=>`<option ${s===r.status?"selected":""}>${s}</option>`).join("")}</select><div class="bar"><i style="width:${r.progress}%"></i></div></div><span class="priority">${r.priority}</span><div class="teams">${r.teams.map(t=>`<span>${esc(t)}</span>`).join("")}</div><div class="phase-dates"><label>锁定时间<input class="date-input" data-date-id="${r.id}" data-date-field="lock" value="${esc(r.lock)}" placeholder="MM-DD"></label><label>开发时间<input class="date-input" data-date-id="${r.id}" data-date-field="dev" value="${esc(r.dev)}" placeholder="MM-DD"></label><label>测试时间<input class="date-input" data-date-id="${r.id}" data-date-field="test" value="${esc(r.test)}" placeholder="MM-DD"></label><label>上线时间<input class="date-input" data-date-id="${r.id}" data-date-field="release" value="${esc(r.release)}" placeholder="MM-DD"></label></div><span class="risk-tag ${r.risk==="高风险"?"risk-high":""}">${r.risk}</span></article>`).join("");
      const validDate=d=>/^\d{2}-\d{2}$/.test(d);
      scheduleRoot.innerHTML=pageList.filter(r=>validDate(r.lock)&&validDate(r.release)).map(r=>{const dateIndex=d=>{const [m,day]=d.split("-").map(Number);return m===8?25+day:day-6},start=Math.max(0,dateIndex(r.lock)/42*100),end=Math.min(100,dateIndex(r.release)/42*100);return `<article class="schedule-row"><div class="schedule-name"><span class="priority">${r.priority}</span><div><strong>${esc(r.title)}</strong><small>${r.status} · ${esc(r.source)}</small></div></div><div class="timeline"><i style="left:${start}%;width:${Math.max(5,end-start)}%"></i></div></article>`}).join("");
      pagination.innerHTML=`<span>显示 ${list.length?startIndex+1:0}–${Math.min(startIndex+pageSize,list.length)}，共 ${list.length} 条</span><button data-page="${currentPage-1}" ${currentPage===1?"disabled":""}>‹</button>${Array.from({length:pageCount},(_,i)=>`<button class="${i+1===currentPage?"active":""}" data-page="${i+1}">${i+1}</button>`).join("")}<button data-page="${currentPage+1}" ${currentPage===pageCount?"disabled":""}>›</button>`;
      document.querySelectorAll(".status[data-id]").forEach(el=>el.onchange=e=>{requirements.find(r=>r.id===Number(e.target.dataset.id)).status=e.target.value;saveStatuses();render()});
      document.querySelectorAll(".date-input[data-date-id]").forEach(el=>el.onchange=e=>{const r=requirements.find(item=>item.id===Number(e.target.dataset.dateId)),field=e.target.dataset.dateField,newValue=e.target.value.trim()||"待定",oldDate=parseMD(e.target.defaultValue),newDate=parseMD(newValue);r[field]=newValue;if(oldDate&&newDate){const days=Math.round((newDate-oldDate)/86400000),index=phaseOrder.indexOf(field);phaseOrder.slice(index+1).forEach(next=>{r[next]=shiftMD(r[next],days)})}saveDates();render()});
      document.querySelectorAll("[data-source-id]").forEach(el=>el.onclick=()=>openSource(Number(el.dataset.sourceId)));
      pagination.querySelectorAll("button:not(:disabled)").forEach(el=>el.onclick=()=>{currentPage=Number(el.dataset.page);render();window.scrollTo({top:document.getElementById("poolView").offsetTop-20,behavior:"smooth"})})
    }
    function openSource(id){const r=requirements.find(item=>item.id===id),sourceModal=document.getElementById("sourceModal");document.getElementById("sourceTitle").textContent=r.title;document.getElementById("sourceType").textContent=r.source;document.getElementById("sourceDetail").textContent=r.sourceDetail;document.getElementById("sourceOriginal").textContent=r.sourceOriginal;sourceModal.style.display="flex"}
    function switchView(view){const pool=view==="pool";document.getElementById("poolView").style.display=pool?"block":"none";document.getElementById("scheduleView").style.display=pool?"none":"block";document.getElementById("pageTitle").textContent=pool?"需求池":"功能排期";document.getElementById("pageSubtitle").textContent=pool?"每个功能点独立管理状态、需求来源和发布时间":"按功能点查看设计、开发、测试与发布占用时间";document.querySelectorAll("[data-view]").forEach(b=>b.classList.toggle("active",b.dataset.view===view))}
    document.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>switchView(b.dataset.view));["searchInput","statusFilter","priorityFilter","moduleFilter","sortBy"].forEach(id=>document.getElementById(id).addEventListener(id==="searchInput"?"input":"change",()=>{currentPage=1;render()}));
    document.querySelectorAll("[data-plan]").forEach(b=>b.onclick=()=>{planFilter=b.dataset.plan;currentPage=1;document.querySelectorAll("[data-plan]").forEach(x=>x.classList.toggle("active",x===b));render()});
    const sourceModal=document.getElementById("sourceModal");document.getElementById("closeSourceModal").onclick=()=>sourceModal.style.display="none";sourceModal.onclick=e=>{if(e.target===sourceModal)sourceModal.style.display="none"};
    render();
  </script>
</body>
</html>
